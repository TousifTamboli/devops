events {
    worker_connections 1024;
}

http {
    upstream backend_cluster {
        # Using least_conn for better load balancing across instances
        least_conn;
        server backend1:5000;
        server backend2:5000;
        server backend3:5000;
    }

    server {
        listen 80;

        # Rate limiting configuration can also be added here at Nginx level
        # limit_req_zone $binary_remote_addr zone=mylimit:10m rate=5r/m;

        location /api/ {
            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Pass cookies securely
            proxy_cookie_path / "/; secure; HttpOnly; SameSite=strict";
        }
        
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
