version: '3.8'

services:
  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3

  # Backend Instances (Simulating 3 scales)
  backend1:
    build: 
      context: ./backend
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI} # Will use Atlas in production
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - NODE_ENV=production
      - CLIENT_URL=http://localhost
    depends_on:
      - redis

  backend2:
    build: 
      context: ./backend
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - NODE_ENV=production
      - CLIENT_URL=http://localhost
    depends_on:
      - redis

  backend3:
    build: 
      context: ./backend
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - NODE_ENV=production
      - CLIENT_URL=http://localhost
    depends_on:
      - redis

  # Redis for Token Blacklisting
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # We omit mongodb container because the architecture specified MongoDB Atlas (managed, auto-scales)

  # Frontend Serve (Optional, can be served by Nginx directly or another container)
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
