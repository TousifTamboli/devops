version: "3"

services:
  mongo:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes: 
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: backend
    ports:
      - "5001:5001"
    depends_on:
      - mongo
    env_file:
      - ./server/.env

  client:
    build: ./client
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - server
    env_file:
      - ./client/.env

volumes:
  mongo_data:
